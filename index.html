<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dandadan AI - Lucas_Will Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)), 
                        url('https://images.alphacoders.com/135/1358327.png');
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow: hidden;
        }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .signature-font { font-family: 'Permanent Marker', cursive; }
        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-thumb { background: rgba(0, 242, 255, 0.3); border-radius: 10px; }
    </style>
</head>
<body class="h-[100dvh] w-full flex flex-col items-center justify-center relative">

    <div class="absolute top-2 left-2 md:top-6 md:left-6 z-50 p-2 md:p-4 rounded-xl glass border border-cyan-500/30">
        <p class="text-[7px] md:text-[9px] text-gray-400 uppercase tracking-tighter">Assinatura do Ator</p>
        <p class="signature-font text-sm md:text-2xl text-cyan-400 leading-tight">Lucas_Will</p>
        <p class="text-[8px] md:text-[11px] text-gray-300 opacity-70">lluuccaaacull@gmail.com</p>
    </div>

    <div class="w-full h-full md:max-w-4xl md:h-[85vh] flex flex-col glass md:rounded-3xl shadow-2xl overflow-hidden">
        
        <header class="p-4 md:p-5 border-b border-white/10 flex items-center gap-3 bg-white/5 mt-14 md:mt-0">
            <div class="w-10 h-10 md:w-12 md:h-12 bg-gradient-to-tr from-cyan-500 to-purple-600 rounded-full flex items-center justify-center font-bold text-white border border-white/20">LW</div>
            <div>
                <h1 class="font-semibold text-sm md:text-lg text-white">Dandadan Core v2.0</h1>
                <p class="text-[10px] md:text-xs text-cyan-400">Lucas_Will System | Arquivos Ativos</p>
            </div>
        </header>

        <div id="chat-window" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-4">
            <div class="bg-white/5 p-4 rounded-2xl rounded-tl-none max-w-[85%] text-gray-200 text-xs md:text-sm border border-white/5">
                Olá Lucas_Will. Agora posso analisar textos de arquivos e fotos. Use o ícone de anexo!
            </div>
        </div>

        <div id="file-preview" class="hidden px-6 py-2 bg-cyan-900/30 flex items-center gap-2 text-[10px] text-cyan-300">
            <span id="file-name" class="truncate max-w-[200px]">arquivo.pdf</span>
            <button onclick="clearFile()" class="text-red-400 font-bold ml-2">✕</button>
        </div>

        <div class="p-3 md:p-6 bg-black/40 border-t border-white/10">
            <div class="relative flex items-center gap-2 max-w-5xl mx-auto w-full">
                
                <label class="cursor-pointer bg-white/10 p-3 rounded-xl hover:bg-white/20 transition-all border border-white/10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                    </svg>
                    <input type="file" id="file-input" class="hidden" onchange="handleFile(this)">
                </label>

                <input id="user-input" type="text" 
                    class="flex-1 bg-white/5 border border-white/10 rounded-2xl py-3 md:py-4 px-4 outline-none focus:border-cyan-500 text-white text-sm"
                    placeholder="Escreva ou anexe algo...">
                
                <button onclick="enviar()" id="btn" class="bg-cyan-600 p-3 md:px-6 rounded-xl font-bold text-white active:scale-90 disabled:opacity-50 text-xs uppercase">
                    OK
                </button>
            </div>
        </div>
    </div>

    <script>
        let attachedContent = "";

        function handleFile(input) {
            const file = input.files[0];
            if (!file) return;

            document.getElementById('file-preview').classList.remove('hidden');
            document.getElementById('file-name').innerText = "Anexo: " + file.name;

            const reader = new FileReader();
            reader.onload = function(e) {
                // Se for texto, lemos o conteúdo. Se for foto/outro, enviamos o nome e o tipo.
                if (file.type.includes('text') || file.name.endsWith('.txt')) {
                    attachedContent = "\n\n[CONTEÚDO DO ARQUIVO ANEXADO]:\n" + e.target.result;
                } else {
                    attachedContent = `\n\n[O usuário anexou um arquivo do tipo ${file.type} chamado ${file.name}]`;
                }
            };
            reader.readAsText(file);
        }

        function clearFile() {
            attachedContent = "";
            document.getElementById('file-input').value = "";
            document.getElementById('file-preview').classList.add('hidden');
        }

        async function enviar() {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat-window');
            const btn = document.getElementById('btn');
            const prompt = input.value;
            if(!prompt && !attachedContent) return;

            btn.disabled = true;
            chat.innerHTML += `<div class="flex justify-end"><div class="bg-cyan-600/80 p-3 rounded-2xl max-w-[85%] text-white text-xs md:text-sm">${prompt} ${attachedContent ? '📎' : ''}</div></div>`;
            
            const fullPrompt = prompt + attachedContent;
            input.value = '';
            clearFile();
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: fullPrompt })
                });

                const data = await res.json();
                const resposta = data.choices[0].message.content;

                chat.innerHTML += `
                    <div class="flex justify-start">
                        <div class="bg-white/10 p-3 rounded-2xl max-w-[85%] text-gray-100 text-xs md:text-sm border border-white/5">
                            <b class="text-cyan-400 block text-[9px] uppercase">Lucas_Will Assistant</b>
                            ${resposta}
                        </div>
                    </div>`;
            } catch (err) {
                chat.innerHTML += `<div class="text-red-400 text-center">Erro no sistema.</div>`;
            } finally {
                btn.disabled = false;
                chat.scrollTop = chat.scrollHeight;
            }
        }
    </script>
</body>
</html>
