<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Anything_Answer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col h-screen">
    <div id="chat" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
    <div class="p-4 bg-gray-800 flex gap-2">
        <input id="msg" type="text" class="flex-1 bg-gray-700 p-2 rounded" placeholder="Pergunta sem limites...">
        <button onclick="enviar()" class="bg-red-600 px-4 py-2 rounded font-bold">manda vir</button>
    </div>

    <script>
        async function enviar() {
            const msgInput = document.getElementById('msg');
            const chat = document.getElementById('chat');
            const texto = msgInput.value;
            if(!texto) return;

            chat.innerHTML += `<div class="text-right text-blue-400 font-bold">Tu: ${texto}</div>`;
            msgInput.value = '';

            const res = await fetch('/api/chat', {
                method: 'POST',
                body: JSON.stringify({ prompt: texto })
            });
            const data = await res.json();
            const resposta = data.choices[0].message.content;

            chat.innerHTML += `<div class="bg-gray-800 p-3 rounded">IA: ${resposta}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
